services:
  - type: web
    name: spnet-gram-backend
    env: python
    rootDir: services/spnet-gram-backend
    buildCommand: pip install -r requirements.txt
    startCommand: python server.py
    plan: free
    autoDeploy: true
    envVars:
      - key: PYTHONUNBUFFERED
        value: "1"
      - key: SPNET_DB_PATH
        value: /var/data/spnet_gram.db
      - key: SPNET_BOOTSTRAP_EMAIL
        value: savansocialsp@gmail.com
      - key: SPNET_BOOTSTRAP_ROLE
        value: manager
      - key: SPNET_MANAGER_EMAILS
        value: savan222859@gmail.com,savansocialsp@gmail.com
      - key: SPNET_TRUSTED_EMAILS
        value: savan222859@gmail.com,savansocialsp@gmail.com
    disk:
      name: spnet-gram-data
      mountPath: /var/data
      sizeGB: 1
